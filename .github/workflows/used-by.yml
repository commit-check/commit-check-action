name: Used By

on:
  schedule:
    # https://crontab.guru/
    - cron: '0 9 * * 1' # At 09:00 on Monday.
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write

jobs:
  used-by:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: shenxianpeng/used-by@4c0501cd4b6370c275b50d46400538ae90b8e7a9 # v0.1.5
        with:
          repo: '${{ github.repository }}'
          update-badge: 'true'

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          add-paths: "README.md" # the file path to commit
          commit-message: "chore: update used-by badge by github-actions[bot]"
          title: "chore: automatically update used-by badge"
          base: main
          labels: skip-changelog
          delete-branch: true
